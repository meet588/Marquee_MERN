<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Model</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>


    <div class="header">
        <h1>BoxModel.CSS</h1>
    </div>

    <div class="box">
        Every element on the page has its own box, which can be styled using CSS.
    </div>

    <div class="box">
        From the inside out:
    </div>

    <div class="list">
        <ul>
            <li><span class="content">content</span></li>
            <li><span class="padding">padding</span></li>
            <li><span class="border">border</span></li>
            <li><span class="margin">margin</span></li>
        </ul>
    </div>

    <h2>Background</h2>
    <button>Click me</button>
    <div class="box">
        Keep in mind that a <span class="highlight">background</span> will cover the content and the padding.
    </div>

</body>
</html>
